{% extends "shared/_layout.html" %}

{% block content %}

<div class="container mt-4">

    <h3>حذف نویسنده</h3>

    <hr>

    <p>
        آیا از حذف
        <strong>{{ object.full_name }}</strong>
        مطمئن هستید؟
    </p>

    <form method="post">

        {% csrf_token %}

        <button class="btn btn-danger">
            حذف
        </button>

        <a href="{% url 'author-list' %}" class="btn btn-secondary">
            انصراف
        </a>

    </form>

</div>

{% endblock %}
