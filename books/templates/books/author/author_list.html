{% extends "shared/_layout.html" %}

{% block content %}

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">

        <h3>نویسندگان</h3>

        <a href="{% url 'author-create' %}" class="btn btn-success">
            افزودن نویسنده
        </a>

    </div>

    <form method="get" class="mb-3">

        <div class="row">

            <div class="col-md-6">

                <input
                    type="text"
                    name="search"
                    class="form-control"
                    placeholder="جستجوی نویسنده..."
                    value="{{ request.GET.search }}"
                >

            </div>

            <div class="col-md-2">

                <button class="btn btn-primary w-100">
                    جستجو
                </button>

            </div>

        </div>

    </form>

    <table class="table table-bordered table-striped">

        <thead>

        <tr>

            <th>ردیف</th>
            <th>نام نویسنده</th>
            <th>عملیات</th>

        </tr>

        </thead>

        <tbody>

        {% for author in authors %}

            <tr>

                <td>{{ author.id }}</td>
                <td><a href="{% url 'author-detail' author.pk %}" class="text-dark fw-semibold text-decoration-none">{{ author.full_name }}</a></td>

                <td>

                    <a href="{% url 'author-update' author.id %}"
                       class="btn btn-warning btn-sm">
                        ویرایش
                    </a>

                    <a href="{% url 'author-delete' author.id %}"
                       class="btn btn-danger btn-sm">
                        حذف
                    </a>

                </td>

            </tr>

        {% empty %}

            <tr>

                <td colspan="3">
                    هیچ نویسنده‌ای ثبت نشده است.
                </td>

            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
